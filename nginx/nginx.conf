# ==============================================================================
# Nginx Hardened Production Configuration - Confimax UPTAI
# ==============================================================================
# Este archivo configura a Nginx como un proxy inverso de alto rendimiento y
# seguridad extrema. Cumple estrictamente con los lineamientos de la UPTAI 
# al forzar TLS 1.3 obligatorio, inyectar headers OWASP y establecer límites de carga.

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Ocultar la versión de Nginx por seguridad informativa
    server_tokens off;

    # Optimización de buffers y transferencia de archivos
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M; # Evita subida de archivos masivos maliciosos

    # Configuración de Gzip para optimizar velocidad de transferencia
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==========================================================================
    # SEGURIDAD DDOS: Rate Limiting Zonificado por IP
    # ==========================================================================
    # Define zona de almacenamiento en memoria de 10 Megabytes (aprox. 160.000 IPs)
    # Limita a un promedio de 15 peticiones por segundo por dirección IP.
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=15r/s;
    limit_req_status 429; # Código de error personalizado para Rate Limiting

    # ==========================================================================
    # UPSTREAM: Ruteo al API Gateway Interno / Render Cloud
    # ==========================================================================
    upstream api_gateway_upstream {
        server api-gateway:8080 max_fails=3 fail_timeout=10s;
        keepalive 32; # Mantiene sockets abiertos para optimizar latencia
    }

    # Redirección global obligatoria de HTTP (Puerto 80) a HTTPS (Puerto 443)
    server {
        listen 80;
        listen [::]:80;
        server_name api-confimax.bitforges.com confimax.bitforges.com;
        
        # Health checks locales permitidos sin forzar SSL (para orquestadores)
        location /health {
            access_log off;
            return 200 'OK-ALIVE';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # CONFIGURACIÓN DEL SERVIDOR SEGURO (HTTPS - Puerto 443)
    # ==========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on; # Habilita HTTP/2 multiplexado para velocidad extrema
        server_name api-confimax.bitforges.com confimax.bitforges.com;

        # ----------------------------------------------------------------------
        # CIFRADO EXTREMO: TLS 1.3 Obligatorio 
        # ----------------------------------------------------------------------
        ssl_protocols TLSv1.3; # Forzar únicamente TLS 1.3, rechazando 1.2, 1.1 y 1.0
        ssl_prefer_server_ciphers off; # En TLS 1.3, el servidor decide la mejor suite automáticamente
        
        # Certificados SSL (Montados dinámicamente o gestionados por Certbot/Cloudflare)
        ssl_certificate /etc/nginx/certs/confimax.crt;
        ssl_certificate_key /etc/nginx/certs/confimax.key;

        # Optimización de Sesiones SSL
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off; # Evita vulnerabilidades de secuestro de tickets

        # ----------------------------------------------------------------------
        # CABECERAS DE SEGURIDAD AVANZADAS (OWASP Compliance)
        # ----------------------------------------------------------------------
        # HSTS (HTTP Strict Transport Security): Fuerza al navegador a usar siempre HTTPS por 2 años
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        
        # CSP (Content Security Policy): Restringe de dónde se cargan los recursos
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google-analytics.com; img-src 'self' data: https://res.cloudinary.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api-confimax.bitforges.com https://api.upstash.io https://*.supabase.co; frame-ancestors 'none'; object-src 'none';" always;
        
        # X-Frame-Options: Mitiga ataques de Clickjacking evitando incrustación en iFrames
        add_header X-Frame-Options "DENY" always;
        
        # X-Content-Type-Options: Evita el rastreo/sniffing MIME malicioso
        add_header X-Content-Type-Options "nosniff" always;
        
        # Referrer-Policy: Controla la información de procedencia enviada en las cabeceras
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Permissions-Policy: Bloquea el acceso a hardware local del cliente no deseado
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        
        # X-XSS-Protection: Fuerza al navegador a bloquear renderizados ante inyecciones XSS
        add_header X-XSS-Protection "1; mode=block" always;

        # ----------------------------------------------------------------------
        # PROXYING Y RATE LIMITING AL API GATEWAY
        # ----------------------------------------------------------------------
        location /api/ {
            # Aplicar Rate Limiting con ráfaga tolerada de hasta 20 peticiones
            limit_req zone=api_limit_zone burst=20 nodelay;

            proxy_pass http://api_gateway_upstream/;
            proxy_http_version 1.1;
            
            # Soporte de WebSockets para telemetría en tiempo real
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Reenvío de datos del cliente real a los microservicios de Render
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Tiempos de espera optimizados para evitar sockets caídos o huérfanos
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            
            # Desactivar almacenamiento en búfer para respuestas de streaming
            proxy_buffering off;
        }

        # Servir el panel administrativo estático
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cacheo estático para recursos inmutables
            location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, no-transform, public, immutable";
                add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
                add_header X-Frame-Options "DENY" always;
                add_header X-Content-Type-Options "nosniff" always;
            }
        }
    }
}
