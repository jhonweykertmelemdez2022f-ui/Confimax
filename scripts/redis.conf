# Redis configuration for Confimax

# Network
bind 0.0.0.0
port 6379

# General
daemonize no
protected-mode yes

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Performance
timeout 300
tcp-keepalive 60

# Logging
loglevel notice

# Security (will be overridden by --requirepass in docker-compose)
# requirepass will be set via environment variable REDIS_PASSWORD
