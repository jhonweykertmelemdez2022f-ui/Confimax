services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: confimax-postgres
    environment:
      POSTGRES_USER: confimax
      POSTGRES_PASSWORD: confimax123
      POSTGRES_DB: confimax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confimax -d confimax"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - confimax-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: confimax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - confimax-network

  # Auth Service
  auth-service:
    image: reiastora/confimax-auth-service:latest
    container_name: confimax-auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://confimax:confimax123@postgres:5432/confimax
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRATION: 24h
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - confimax-network

  # Inventory Service
  inventory-service:
    image: reiastora/confimax-inventory-service:latest
    container_name: confimax-inventory-service
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://confimax:confimax123@postgres:5432/confimax
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - confimax-network

  # Sales Service
  sales-service:
    image: reiastora/confimax-sales-service:latest
    container_name: confimax-sales-service
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgres://confimax:confimax123@postgres:5432/confimax
      REDIS_URL: redis://redis:6379
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - confimax-network

  # Customers Service
  customers-service:
    image: reiastora/confimax-customers-service:latest
    container_name: confimax-customers-service
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgres://confimax:confimax123@postgres:5432/confimax
      REDIS_URL: redis://redis:6379
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - confimax-network

  # Notifications Service
  notifications-service:
    image: reiastora/confimax-notifications-service:latest
    container_name: confimax-notifications-service
    environment:
      NODE_ENV: production
      PORT: 3005
      REDIS_URL: redis://redis:6379
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - confimax-network

  # Fabiana Service
  fabiana-service:
    image: reiastora/confimax-fabiana-service:latest
    container_name: confimax-fabiana-service
    environment:
      NODE_ENV: production
      PORT: 3006
    ports:
      - "3006:3006"
    restart: unless-stopped
    networks:
      - confimax-network

  # API Gateway
  api-gateway:
    image: reiastora/confimax-api-gateway:latest
    container_name: confimax-api-gateway
    environment:
      NODE_ENV: production
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3001
      INVENTORY_SERVICE_URL: http://inventory-service:3002
      SALES_SERVICE_URL: http://sales-service:3003
      CUSTOMERS_SERVICE_URL: http://customers-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3005
      FABIANA_SERVICE_URL: http://fabiana-service:3006
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - inventory-service
      - sales-service
      - customers-service
      - notifications-service
      - fabiana-service
    restart: unless-stopped
    networks:
      - confimax-network

volumes:
  postgres_data:
  redis_data:

networks:
  confimax-network:
    driver: bridge
