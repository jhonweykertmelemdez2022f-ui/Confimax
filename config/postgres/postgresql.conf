# Configuración de memoria y recursos para PostgreSQL en contenedor
# Ajustado para un contenedor con límite de 1GB RAM

# Memoria compartida para caché de tablas (25% de la RAM del contenedor)
shared_buffers = 256MB

# Memoria efectiva disponible para el planner (50% de la RAM)
effective_cache_size = 512MB

# Memoria por operación de ordenación/hash (cuidado con muchas conexiones)
work_mem = 16MB

# Memoria para operaciones de mantenimiento (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 64MB

# Número máximo de conexiones concurrentes
max_connections = 100

# Configuración de WAL (Write Ahead Logging) optimizada
wal_buffers = 16MB
min_wal_size = 80MB
max_wal_size = 1GB

# Checkpoint cada 5 minutos o 256MB
checkpoint_timeout = 5min
max_wal_size = 256MB

# Configuración de logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000  # Log queries que tomen más de 1 segundo
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Optimizaciones para transacciones frecuentes (sistema de ventas)
synchronous_commit = off  # Riesgo mínimo de pérdida de datos, mejor rendimiento
fsync = on
full_page_writes = on

# Autovacuum optimizado
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# Timezone
timezone = 'UTC'

# Escuchar en todas las interfaces (necesario para Docker)
listen_addresses = '*'

# Configuración para conexiones externas (si necesitas conectar a otras DBs)
# Ajusta según tus necesidades de red
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6
