# Configuración de Redis optimizada para contenedor
# Archivo: /etc/redis/redis.conf

# Puerto y interfaces
port 6379
bind 0.0.0.0
protected-mode yes

# Autenticación (la contraseña se pasa por variable de entorno)
# requirepass se configura en el comando de docker-compose

# Memoria (estos valores se sobrescriben por los argumentos del comando)
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# Persistencia (AOF - Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Snapshots RDB desactivados - usamos solo AOF para evitar fork() en contenedores
# Esto elimina el warning vm.overcommit_memory en Docker
save ""
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Límites de clientes
maxclients 100

# Timeouts
timeout 300
tcp-keepalive 300

# Logging
loglevel warning
logfile ""

# Política de memoria cuando se alcanza el límite
# allkeys-lru: Elimina las claves menos usadas recientemente
maxmemory-policy allkeys-lru

# Configuración de lazy freeing (liberación de memoria asíncrona)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Desactivar comandos peligrosos en producción
rename-command FLUSHDB ""
rename-command FLUSHALL ""
# Si necesitas usar estos comandos, comenta las líneas anteriores

# Notificaciones (útil para pub/sub)
notify-keyspace-events Ex

# Optimizaciones para contenedores
disable-thp yes
