        value: "rediss://default:gQAAAAAAAdIgAAIgcDFhNDRkNmE3OTg5YjA0MDBlODE4MzQxMGY5NGVjNmU0Mg@good-iguana-119328.upstash.io:6379"

      # 3. 🍃 MONGODB ATLAS (MongoDB Cloud)
