        value: "mongodb://jak:jema2019@ac-s1gj562-shard-00-00.tedq2nv.mongodb.net:27017,ac-s1gj562-shard-00-01.tedq2nv.mongodb.net:27017,ac-s1gj562-shard-00-02.tedq2nv.mongodb.net:27017/confimax_logs?ssl=true&replicaSet=atlas-mrqwtn-shard-0&authSource=admin&appName=Confimax"
      - key: MONGO_DB
