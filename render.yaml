# Render Blueprint Specification for Confimax Deploy
# Documentación: https://render.com/docs/blueprints

services:
  # ============================================================================
  # SERVICIO 1: Confimax API Gateway
  # Recibe el tráfico público de la web y la app móvil, aplica rate limiting y rutea.
  # ============================================================================
  - type: web
    name: confimax-api-gateway
    runtime: node
    plan: free
    # Root Directory vacío para poder acceder a dependencias compartidas globales
    buildCommand: npm install && cd services/api-gateway && npm install
    startCommand: cd services/api-gateway && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONOLITH_MODE
        value: "true" # Activa el modo monolito dinámico en el gateway
      
      # Enlace dinámico al JWT_SECRET generado en el backend unificado
      - key: JWT_SECRET
        fromService:
          name: confimax-backend-unified
          type: web
          envVarKey: JWT_SECRET
      
      # Upstash Redis para el Rate Limiting (Render le pedirá al usuario ingresar este valor)
      - key: REDIS_URL
      
      # Enlace dinámico de Render al URL externo del Backend
      - key: BACKEND_SERVICE_URL
        fromService:
          name: confimax-backend-unified
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ============================================================================
  # SERVICIO 2: Confimax Backend Unificado (Monolito)
  # Centraliza Auth, Inventario, Ventas, Clientes, Sincronización Móvil y Auditoría.
  # ============================================================================
  - type: web
    name: confimax-backend-unified
    runtime: node
    plan: free
    # Root Directory vacío para poder resolver 'services/shared' correctamente
    buildCommand: npm install && cd services/backend && npm install
    startCommand: cd services/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generará una contraseña segura automáticamente
      
      # PostgreSQL (Supabase - Render le pedirá al usuario ingresar este valor)
      - key: DATABASE_URL
      
      # Redis (Upstash - Render le pedirá al usuario ingresar este valor)
      - key: REDIS_URL
      
      # MongoDB (Atlas - Render le pedirá al usuario ingresar este valor)
      - key: MONGO_URL
      - key: MONGO_DB
        value: confimax
