        value: "postgresql://postgres.tlrliqbgtdplwdvbxqxv:Jackwell2019*2424@aws-1-us-west-2.pooler.supabase.com:5432/postgres?schema=public"
      - key: POSTGRES_HOST
        value: "aws-1-us-west-2.pooler.supabase.com"
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        value: "postgres.tlrliqbgtdplwdvbxqxv"
