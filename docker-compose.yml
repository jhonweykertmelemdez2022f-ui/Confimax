services:


  # Auth Service
  auth-service:
    image: node:18-alpine
    container_name: confimax-auth-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/auth-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres.tlrliqbgtdplwdvbxqxv:Jackwell2019%2A2424@aws-1-us-west-2.pooler.supabase.com:5432/postgres?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRATION: 24h
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - confimax-network

  # Inventory Service
  inventory-service:
    image: node:18-alpine
    container_name: confimax-inventory-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/inventory-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://postgres.tlrliqbgtdplwdvbxqxv:Jackwell2019%2A2424@aws-1-us-west-2.pooler.supabase.com:5432/postgres?schema=public
    ports:
      - "3002:3002"
    restart: unless-stopped
    networks:
      - confimax-network

  # Sales Service
  sales-service:
    image: node:18-alpine
    container_name: confimax-sales-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/sales-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://postgres.tlrliqbgtdplwdvbxqxv:Jackwell2019%2A2424@aws-1-us-west-2.pooler.supabase.com:5432/postgres?schema=public
    ports:
      - "3003:3003"
    restart: unless-stopped
    networks:
      - confimax-network

  # Customers Service
  customers-service:
    image: node:18-alpine
    container_name: confimax-customers-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/customers-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://postgres.tlrliqbgtdplwdvbxqxv:Jackwell2019%2A2424@aws-1-us-west-2.pooler.supabase.com:5432/postgres?schema=public
    ports:
      - "3004:3004"
    restart: unless-stopped
    networks:
      - confimax-network

  # Notifications Service
  notifications-service:
    image: node:18-alpine
    container_name: confimax-notifications-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/notifications-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3005
    ports:
      - "3005:3005"
    restart: unless-stopped
    networks:
      - confimax-network

  # Fabiana Service
  fabiana-service:
    image: node:20-alpine
    container_name: confimax-fabiana-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/fabiana-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3006
    ports:
      - "3006:3006"
    restart: unless-stopped
    networks:
      - confimax-network

  # Webhook Service
  webhook-service:
    image: node:18-alpine
    container_name: confimax-webhook-service
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/webhook-service && npm start"
    environment:
      NODE_ENV: production
      PORT: 3007
      WEBHOOK_SECRET: confimax-webhook-secret-key # As per webhook-service/src/config/index.js
      CORS_ORIGIN: '*' # As per webhook-service/src/config/index.js
    ports:
      - "3007:3007"
    restart: unless-stopped
    networks:
      - confimax-network

  # API Gateway
  api-gateway:
    image: node:18-alpine
    container_name: confimax-api-gateway
    working_dir: /app
    volumes:
      - ./services:/app/services
    command: sh -c "cd /app/services/api-gateway && npm start"
    environment:
      NODE_ENV: production
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3001
      INVENTORY_SERVICE_URL: http://inventory-service:3002
      SALES_SERVICE_URL: http://sales-service:3003
      CUSTOMERS_SERVICE_URL: http://customers-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3005
      FABIANA_SERVICE_URL: http://fabiana-service:3006
      WEBHOOK_SERVICE_URL: http://webhook-service:3007
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - inventory-service
      - sales-service
      - customers-service
      - notifications-service
      - fabiana-service
      - webhook-service
    restart: unless-stopped
    networks:
      - confimax-network
networks:
  confimax-network:
    driver: bridge
